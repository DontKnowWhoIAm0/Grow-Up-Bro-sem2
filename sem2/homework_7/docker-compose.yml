services:
  router:
    image: postgres:15
    container_name: router
    environment:
      POSTGRES_DB: GUB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5437:5432"
    volumes:
      - pgdata_router:/var/lib/postgresql/data

  shard1:
    image: postgres:15
    container_name: shard1
    environment:
      POSTGRES_DB: GUB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5438:5432"
    volumes:
      - pgdata_shard1:/var/lib/postgresql/data

  shard2:
    image: postgres:15
    container_name: shard2
    environment:
      POSTGRES_DB: GUB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5439:5432"
    volumes:
      - pgdata_shard2:/var/lib/postgresql/data

volumes:
  pgdata_router:
  pgdata_shard1:
  pgdata_shard2: