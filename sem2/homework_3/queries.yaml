pg_queries_stats:
  query: |
    SELECT 
      sum(seq_tup_read + idx_tup_fetch) as select,
      sum(n_tup_ins) as insert,
      sum(n_tup_del) as delete
    FROM pg_stat_user_tables
  metrics:
    - select:
        usage: "COUNTER"
        description: "Select total"
    - insert:
        usage: "COUNTER"
        description: "Insert total"
    - delete:
        usage: "COUNTER"
        description: "Delete total"

pg_active_sessions:
  query: |
    SELECT count(*) as active_sessions 
    FROM pg_stat_activity 
    WHERE state = 'active' AND backend_type = 'client backend'
  metrics:
    - active_sessions:
        usage: "GAUGE"
        description: "Active sessions"

pg_version:
  query: "SELECT version() as pg_version, 1 as static"
  metrics:
    - pg_version:
        usage: "LABEL"
        description: "Postgres version"
    - static:
        usage: "GAUGE"
        description: "static"